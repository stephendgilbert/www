<!DOCTYPE HTML>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Week 1 - Introduction to C++ Syntax, Variables &amp; Calculations</title>
    <style>
      ul.navlist{
        list-style-type: none;
        margin: 0;
        margin-left: 3em;
        overflow: hidden;
        padding: 0;
        display: inline-block;
      }
      ul.navlist li {
        font-family: serif;
        font-size: 12pt;
        text-decoration: none;
        display: inline;
        /*
        padding-right: .5em;
        padding-left: .5em;
        border-right: 1px solid silver;
        */
        }
      iframe {
        border: none;
      }
      .subtitle {
        font-family: georgia, serif;
        font-style: italic;
        font-size: 10pt;
        padding-right: 2em;
      }
      .link {
          font-weight: bold;
          color: #FFFFFF;
          background-color: navy;
          cursor: pointer;
          padding: 0.2em 0.56em;
          border-radius: 0.56em;
          position: relative;
          font-size: 75%;
          margin-left: 1em;
          margin-right: 1em;
          user-select: none;
          display: inline-block;
          text-decoration: none;
      }
      .active {
        background-color: forestgreen;
        font-weight: bold;
      }
      .inactive {
        background-color: gray;
        fond-weight: normal;
      }

    </style>
</head>
<body>
    <div style="width:850px;">
    <ul class="navlist">
        <li><a class="link" style='background-color:forestgreen;' href="A.html" target="iframe_main" onclick='highlight(this)'>A</a></li>
        <li><a class="link" href="B.html" target="iframe_main" onclick='highlight(this)'>B</a></li>
        <li><a class="link" href="C.html" target="iframe_main" onclick='highlight(this)'>C</a></li>
        <li><a class="link" href="D.html" target="iframe_main" onclick='highlight(this)'>D</a></li>
        <li><a class="link" href="E.html" target="iframe_main" onclick='highlight(this)'>E</a></li>
    </ul>
    </div>
    <iframe style="width: 100%; height: 2000px;margin-top:0;" src="https://www.occ-cs.com/book-23/w01/a/A.html" name="iframe_main"></iframe>
</body>
<script>
  function highlight(e) {
    //alert(e);
    let current = 0;
    for (var i = 0; i < document.links.length; ++i) {
      if (document.links[i].href === e.href) {
        current = i;
      }
      else {
        document.links[i].className = 'link inactive';
      }
    }
    document.links[current].className = 'link active';
  }
</script>
</html>
