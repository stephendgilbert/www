<!DOCTYPE HTML>
<html>
<head>
    <meta charset='UTF-8'>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js" 
        integrity="sha512-aVKKRRi/Q/YV+4mjoKBsE4x3H+BkegoM/em46NNlCqNTmUYADjBbeNefNxYV7giUp0VxICtqdrbqU7iVaeZNXA==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer">
    </script>
    <script>
      const prev = '../B/index.html';
      const next = '../D/index.html';
      const urls = ['A.html', 'B.html', 'C.html', 'D.html', 'E.html'];
      var i = 0;
      $(document).ready(function() {
        var url = urls[i];
        $('div#content').load(url);
      });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <title>Week 1 - Introduction to C++ Syntax, Variables &amp; Calculations</title>
    <style>
      #content {
        max-width:800px;
        margin:auto;
      }
      #nav {
        text-align: center;
        margin:auto;
        font-family: georgia;
        /*font-size: small;*/
        width: 100%;
        /*background: yellow;*/
      }
      #prev {
        font-size:36px;
        float:left;
        margin-left: -1em;
        color:silver;
      }
      #next {
        font-size:36px;
        float:right;
        color:silver;
      }
      #status {
        font-style:italic;
        border-top:1px solid aliceblue;
        border-bottom:1px solid aliceblue;
        width:500px;
        display: inline-block;
      }
    </style>
</head>
<body>
<div id='nav' style='width:850px;'>
  <div id='prev'><i class="fa fa-arrow-circle-left"></i></div>
  <div id='status'>Lesson 1C&mdash;C++ Syntax</div>
  <div id='next'><i class="fa fa-arrow-circle-right"></i></div>
<!--
  <a href='A.html'>A</a> |
  <a href='B.html'>B</a> |
  <a href='C.html'>C</a> |
  <a href='D.html'>D</a> |
  <a href='E.html'>E</a> |
  <a href='F.html'>F</a> |
-->
</div>
<div id='content'>
</div>
</div>
<script>
$('div#prev').bind('click', function(e) {
  $('div#next').show();
  --i;
  if (i == 0) {
    if (prev == null)
      $('div#prev').hide();
    else
      location.href = prev;
  }
  else
  {
    var url = urls[i];
    $('div#content').load(url); 
  }
});
$('div#next').bind('click', function(e) {
  $('div#prev').show();
  ++i;
  if (i == urls.length) {
    if (next == null)
      $('div#next').hide();
    else
      location.href = next;
  }
  else
  {
    var url = urls[i];
    $('div#content').load(url); 
  }
});
</script>
</body>
</html>
