# The open.filter setting is only used on Windows where the file selector has a menu of filters to apply
# to the types of files seen when opening.
# There is a limit (possibly 256 characters) to the length of a filter,
# so not all source extensions can be in this setting.
source.files=*.asm;*.c;*.cc;*.cpp;*.cxx;*.cs;*.h;*.hh;*.hxx;*.hpp;\
*.idl;*.odl;*.rc;*.rc2;*.dlg;*.def;\
*.vb;*.vbs;*.bas;*.frm;*.cls;*.ctl;\
*.java;*.js;*.jsp;*.py;*.pl;*.rb;*.cgi;*.lua;*.conf;\
make*;*.mak;\
*.properties;*.html;*.xml;*.iface;*.bat;*.e

open.filter=\
All Source|$(source.files)|\
All Files (*.*)|*.*|\
$(filter.ada)\
$(filter.conf)\
$(filter.asm)\
$(filter.ave)\
$(filter.baan)\
$(filter.cpp)\
$(filter.css)\
$(filter.eiffel)\
$(filter.fortran)\
$(filter.idl)\
$(filter.java)\
$(filter.js)\
$(filter.jsp)\
$(filter.latex)\
$(filter.lout)\
$(filter.lua)\
$(filter.matlab)\
$(filter.nncrontab)\
$(filter.pascal)\
$(filter.perl)\
$(filter.php)\
$(filter.pov)\
$(filter.properties)\
$(filter.python)\
$(filter.ruby)\
$(filter.sql)\
$(filter.tcl)\
$(filter.text)\
$(filter.vb)\
$(filter.web)

# Give symbolic names to the set of fonts used in the standard styles.
#font.base=font:Verdana,size:10
#font.small=font:Verdana,size:8
#font.comment=font:Comic Sans MS,size:9
#font.code.comment.box=$(font.comment)
#font.code.comment.line=$(font.comment)
#font.code.comment.doc=$(font.comment)
#font.text=font:Times New Roman,size:11
#font.text.comment=font:Verdana,size:9
#font.embedded.base=font:Verdana,size:9
#font.embedded.comment=font:Comic Sans MS,size:8
#font.monospace=font:Andale Mono,size:10
#font.vbs=font:Lucida Sans Unicode,size:10
#font.js=$(font.comment)

font.base=font:Lucida Console,size:10
font.small=font:Lucida Console,size:8
font.comment=font:Lucida Sans,size:10
font.code.comment.box=$(font.comment)
font.code.comment.line=$(font.comment)
font.code.comment.doc=$(font.comment)
font.text=font:Lucida Console,size:10
font.text.comment=font:Lucida Console,size:9
font.embedded.base=font:Lucida Console,size:9
font.embedded.comment=font:Comic Sans MS,size:8
font.monospace=font:Courier New,size:9
#font.monospace=font:Andale Mono,size:8
#font.monospace=font:Lucida Sans Unicode,size:10
font.vbs=font:Lucida Sans Unicode,size:10
font.js=$(font.comment)

# Give symbolic names to the set of colours used in the standard styles.
colour.code.comment.box=fore:#007F00
colour.code.comment.line=fore:#007F00
colour.code.comment.doc=fore:#3F703F
colour.text.comment=fore:#0000FF,back:#D0F0D0
colour.other.comment=fore:#007F00
colour.embedded.comment=back:#E0EEFF
colour.embedded.js=back:#F0F0FF
colour.notused=back:#FF0000

colour.number=fore:#007F7F
colour.keyword=fore:#00007F
colour.string=fore:#7F007F
colour.char=fore:#7F007F
colour.operator=fore:#000000
colour.preproc=fore:#7F7F00
colour.error=fore:#FFFF00,back:#FF0000

# Global default styles for all languages
# Default
style.*.32=$(font.base)
# Line number
style.*.33=back:#C0C0C0,$(font.base)
# Brace highlight
style.*.34=fore:#0000FF,bold
# Brace incomplete highlight
style.*.35=fore:#FF0000,bold
# Control characters
style.*.36=
# Indentation guides
style.*.37=fore:#C0C0C0,back:#FFFFFF

# Printing - only works on Windows
print.magnification=-1
# Setup: left, right, top, bottom margins, in local units:
# hundredths of millimeters or thousandths of inches
print.margins=1000,750,750,750
# Header/footer:
# && = &; &p = current page
# &f = file name; &F = full path
# &d = file date; &D = current date
# &t = file time; &T = full time
print.header.format=$(FileNameExt) ù Printed on $(CurrentDate), $(CurrentTime) ù Page $(CurrentPage)
print.footer.format=$(FilePath) ù File date: $(FileDate) ù File time: $(FileTime)
# Header/footer style
print.header.style=font:Courier New,size:8
print.footer.style=font:Courier New,size:8

# Define the Lexer menu,
# Each item contains three parts: menu string | file extension | key
# The only keys allowed currently are based on F-keys and alphabetic keys and look like
# [Ctrl+][Shift+][Fn|a] such as F12 or Ctrl+Shift+D.
# A '&' may be placed before a letter to be used as an accelerator. This does not work on GTK+.
menu.language=\
Text|txt|Shift+F11|\
&Batch|bat||\
Bullant|ant||\
&C / C++|c||\
C&#|cs||\
CSS|css||\
&Fortran|f90||\
H&ypertext|html|F12|\
&Java|java||\
Java&Script|js||\
Pascal|pas||\
Pe&rl|pl||\
P&HP|php||\
P&LSQL|spec||\
&Properties|properties||\
Pytho&n|py||\
Reso&urce|rc||\
Shell|sh||\
S&QL|sql||\
&TCL|tcl||\
&VB|vb||\
VBScr&ipt|vbs||\
&XML|xml|Shift+F12|

# User defined key commands
user.shortcuts=\
Ctrl+PageUp|IDM_PREVFILE|\
Ctrl+PageDown|IDM_NEXTFILE|
#KeypadPlus|IDM_EXPAND|\
#KeypadMinus|IDM_BLOCK_COMMENT|

