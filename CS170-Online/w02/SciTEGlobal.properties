# Specific changes for my environment
# Add compile (not just build) to cs menu
command.compile.*.cs=csc $(FileNameExt)
command.go.*.cs=$(FileName)
command.go.subsystem.*.cs=2

command.name.1.*.java=Java 1.1 Compile (ACM)
command.1.*.java=javac -cp .;acm.jar -source 1.2 -target 1.1 $(FileNameExt)
command.name.2.*.java=Run ACM Program
command.2.*.java=java -cp .;acm.jar $(FileName) code=$(FileName).class

command.name.3.*.java=Java 5 (only) Compile
command.3.*.java=javac -classpath .;acm.jar -source 1.5 -target 1.5 $(FileNameExt)

# g++ command
command.compile.*.cpp=g++ -ansi -pedantic -Wall -g3 -o $(FileName).exe $(FileNameExt)

# Compile using VC++
command.name.1.*.cpp=VC++ 2002 Compile
command.1.*.cpp=cl /nologo /GX /GR /Zi /Za /Zc:forScope /D_DEBUG /MLd /Fe$(FileName) $(FileNameExt)
command.is.filter.0.*.java=1

# This adds the Appletviewer command to the menu and launches it when
# the current file in the editor is an html file.
command.name.0.*.html=Applet Viewer
command.0.*.html=appletviewer $(FileNameExt)
command.subsystem.0.*.html=1

# Adds indenting for Java, C, and CPP
command.name.0.*.java=Indent
command.0.*.java=astyle --style=ansi -s --convert-tabs $(FileNameExt)
command.is.filter.0.*.java=1

command.name.0.*.cpp=Indent
command.0.*.cpp=astyle --style=ansi  -s --convert-tabs $(FileNameExt)
command.is.filter.0.*.cpp=1

command.name.0.*.c=Indent
command.0.*.c=astyle --style=ansi $(FileNameExt)
command.is.filter.0.*.c=1

# Adds jsp to the list of Web styles
file.patterns.html=$(file.patterns.html);*.aspx;*.jsp;
lexer.$(file.patterns.html)=hypertext

# Default
# style.*.32=back:#FFFFE0$(font.base)

# Find in files works on 2K and XP
find.command=findstr /i /n /s $(find.what) $(find.files)

style.hypertext.15=fore:#FF0000
# ASP Javascript
# JS Start - allows eol filled background to not start on same line as SCRIPT tag
style.hypertext.55=fore:#7F7F00
# JS Default
style.hypertext.56=fore:#000000,bold,$(font.js)
# JS Comment
style.hypertext.57=fore:#007F00,$(font.js)
# JS Line Comment
style.hypertext.58=fore:#007F00,$(font.js)
# JS Doc comment
style.hypertext.59=fore:#7F7F7F,bold,$(font.js)
# JS Number
style.hypertext.60=fore:#007F7F,$(font.js)
# JS Word
style.hypertext.61=fore:#000000,$(font.js)
# JS Keyword
style.hypertext.62=fore:#00007F,bold,$(font.js)
# JS Double quoted string
style.hypertext.63=fore:#7F007F,$(font.js)
# JS Single quoted string
style.hypertext.64=fore:#7F007F,$(font.js)
# JS Symbols
style.hypertext.65=fore:#000000,bold,$(font.js)
