# Steve Gilbert's Modifications for OCC
# Global initialisation file for SciTE
# For Windows, place in same directory as Sc1.EXE

# Globals

# Window sizes and visibility
# Modify these to change initial size and position
position.left=0
position.top=0
position.width=640
position.height=480

# Modify these to change layout of screen
buffers=20
split.vertical=0
tabbar.visible=1
tabbar.multiline=1
toolbar.visible=1
statusbar.visible=1

# Sizes and visibility in edit pane
# Set line.numbers to 4 if you want to see them
line.margin.visible=1
line.margin.width=3+
buffered.draw=1
use.palette=0

# Element styles
caret.period=500
view.whitespace=0
view.indentation.whitespace=1
view.indentation.guides=1
highlight.indentation.guides=1
edge.column=200
edge.mode=0
edge.colour=#C0DCC0
braces.check=1
braces.sloppy=1

selection.back=#DADADA
use.monospaced=1

# Checking
are.you.sure=1
load.on.activate=1
default.file.ext=.java
title.full.path=1
strip.trailing.spaces=1
ensure.final.line.end=1
ensure.consistent.line.ends=1

# Indentation
tabsize=4
indent.size=4
use.tabs=0
indent.automatic=1
indent.opening=0
indent.closing=0
tab.indents=1
backspace.unindents=1
output.wrap=1

# Folding
# enable folding, and show lines below when collapsed.
fold=1
fold.compact=1
fold.flags=16
fold.symbols=1

# Behaviour
clear.before.execute=0
caret.policy.xslop=1
caret.policy.width=20
caret.policy.xstrict=0
caret.policy.xeven=0
caret.policy.xjumps=0
caret.policy.yslop=1
caret.policy.lines=1
caret.policy.ystrict=1
caret.policy.yeven=1
caret.policy.yjumps=0

# Status Bar
statusbar.number=4
statusbar.text.1=\
li=$(LineNumber) co=$(ColumnNumber) $(OverType) ($(EOLMode)) $(FileAttr)
statusbar.text.2=\
$(BufferLength) chars in $(NbOfLines) lines. Sel: $(SelLength) chars.
statusbar.text.3=\
Now is: Date=$(CurrentDate) Time=$(CurrentTime)
statusbar.text.4=\
$(FileNameExt) : $(FileDate) ù $(FileTime) | $(FileAttr)

command.scite.help="file://$(SciteDefaultHome)\SciTEDoc.html"
command.scite.help.subsystem=2

code.page=0

# Export
export.html.wysiwyg=1
export.html.styleused=1

# Define values for use in the imported properties files
chars.alpha=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
chars.numeric=0123456789
