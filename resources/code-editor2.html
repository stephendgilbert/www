
<!DOCTYPE html>
<html >
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCC CS Code Editor</title>
  <base target="_self">
  <meta name="description" content="Here&#39;s a snippet for the Ace Editor. Ace is a high-performance embeddable code editor written in JavaScript. It matches the features and performance of native editors such as Sublime, Vim and TextMate. It can be easily embedded in any web page and JavaScript application. " />
  <meta name="google" value="notranslate">
  <!--stylesheets / link tags loaded here-->

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" />
  <style type="text/css">html,body {
  height:100%;
}

body {
  overflow: hidden;
}

.wrapper {
  width:100%;
  min-height: 100%; 
  height: 100%;
  overflow:hidden;
}

.inner {
  overflow-y:auto;
  overflow-x:hidden;
  /*height:100%;*/
  min-height:100%;
}


</style>

</head>
<body >
<div style='width:900px;'>
<pre id='copyCode'>
</pre>
</div>
<div id="csCodeEditor" tabindex="-1">
  <div role="document" style="display:table;">
    <div class="modal-content">
      <div class="modal-body" style="height:450px; width:900px;">
        <div class="inner" id="htmEditor"></div>
      </div>
      <div class="modal-footer">
        <button id='btnCopy' type="button" class="btn btn-primary">Copy Code</button>
      </div>
    </div>
  </div>
</div>  
  
  <!--scripts loaded here-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  
  <script>
function htmlEncode(str) {
    let result = "";
    for (let i = 0; i < str.length; i++)
    {
        let ch = str.charAt(i);
        switch(ch)
        {
            case '<': result += "&lt;"; break;
            case '>': result += "&gt;"; break;
            case '&': result += "&amp;"; break;
            case '"': result += "\""; break;
            case '\'': result += "\'"; break;
            default: result += ch;
        }
    }
    return result;
}

var htmEditor;
$.getScript('https://cdnjs.cloudflare.com/ajax/libs/ace/1.1.3/ace.js',function(){
  $.getScript('https://cdnjs.cloudflare.com/ajax/libs/ace/1.1.3/ext-language_tools.js',function(){

      ace.require("ace/ext/language_tools");
    
      htmEditor = ace.edit("htmEditor");
      htmEditor.getSession().setMode("ace/mode/c_cpp");
      htmEditor.setFontSize(12);
      htmEditor.setShowPrintMargin(false);
      htmEditor.setHighlightActiveLine(false);

      // code insert examples
      $('#btnCopy').click(function(){
        let ele = document.getElementById('copyCode');
        let contents = htmlEncode(htmEditor.getValue());
        ele.innerHTML = contents;
        //$('#csCodeEditor').hide();
        //$('#copyCode').innerHTML = htmlEncode(htmEditor.getValue());
          //navigator.clipboard.writeText(htmlEncode(htmEditor.getValue()));
      });
    
  });
});

  </script>

</body>
</html>
