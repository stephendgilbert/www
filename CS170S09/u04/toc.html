<html>
<head>
    <link href="../cs170.css" type="text/css" rel="stylesheet" />
    <script src='../cs170.js'></script>
    <script>
        var unit = parent.unit;
        var current = 0;
        function displayTitle()
        {
            if (document.getElementById || document.all)
            {
                var el = document.getElementById
                    ? document.getElementById("lessonTitle")
                    : document.all["lessonTitle"];
                if (el && typeof el.innerHTML != "undefined")
                {
                    if (current == 0)
                        el.innerHTML = "Introduction";
                    else
                        el.innerHTML = "Lesson " + lessons[unit-1][current];
                }
            }
        }
    </script>
    <base target='main'>
</head>
<body style='margin:4;'>
<table style='width:94%;margin:0;margin-right:25px;margin-left:15px;padding:2px;border:1px solid silver;'>
    <tr>
        <td class='breadcrumbsLeft'>
            <script>
                document.write("<a href='intro.html' onclick=javascript:current=0;displayTitle();>Unit " + unit + "</a> : "
                            + lessons[unit-1][0]);
                document.write("<span style='font-weight:normal;font-size:90%;background:white;'>" +
                        "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|<a class='info' href='A.html' " +
                        "onclick=javascript:current=1;displayTitle();><span>" +
                        lessons[unit-1][1] +"</span> A </a>|");
                document.write("<a class='info' href='B.html' " +
                        "onclick=javascript:current=2;displayTitle();><span>" +
                        lessons[unit-1][2] +"</span> B </a>|");
                document.write("<a class='info' href='C.html' " +
                        "onclick=javascript:current=3;displayTitle();><span>" +
                        lessons[unit-1][3] +"</span> C </a>|");
                document.write("<a class='info' href='D.html' " +
                        "onclick=javascript:current=4;displayTitle();><span>" +
                        lessons[unit-1][4] +"</span> D </a>|");
                document.write("<a class='info' href='E.html' " +
                        "onclick=javascript:current=5;displayTitle();><span>" +
                        lessons[unit-1][5] +"</span> E </a>|");
                document.write("<a class='info' href='exercise.html' " +
                        "onclick=javascript:current=6;displayTitle();><span>" +
                        lessons[unit-1][6] +"</span> HW </a>]</span>");
            </script>
        </td>
        <td class='breadcrumbsRight' style='color:navy;' id='lessonTitle'>
            Introduction
        </td>
    </tr>
<table>
</body>
</html>
