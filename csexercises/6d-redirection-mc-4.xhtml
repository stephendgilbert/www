<div>
<p>Which line runs the program named <tt>dd</tt>, getting its input from the output produced by the <tt>date</tt> program?</p>
  <ol class='multiple-choice'>
    <li><tt>./dd &lt; date</tt></li>
    <li><tt>./dd &gt; date</tt></li>
    <li><tt>./dd | date</tt></li>
    <li class='correct'><tt>date | ./dd</tt></li>
    <li><tt>date &gt; ./dd</tt></li>
    <li>None of these</li>
  </ol>
</div>
</div></li>
</ol>
