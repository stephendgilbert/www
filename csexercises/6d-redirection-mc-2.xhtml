<li title='6d-redirection-mc-2' id='6d-redirection-mc-2'><div class='hc-included'>
<div>
<p>Which line runs the program named <tt>pop</tt>, getting its input from <tt>in.txt</tt>
    and appending its output to <tt>out.txt</tt>?</p>
  <ol class='multiple-choice'>
    <li><tt>./pop | in.txt || out.txt</tt></li>
    <li><tt>./pop &lt;&lt; in.txt &gt; out.txt</tt></li>
    <li class='correct'><tt>./pop &lt; in.txt &gt;&gt; out.txt</tt></li>
    <li><tt>./pop &lt; out.txt &gt;&gt; in.txt</tt></li>
    <li><tt>./pop  &gt; out.txt &lt; in.txt</tt></li>
    <li>None of these</li>
  </ol>
</div>
</div></li>
</ol>
