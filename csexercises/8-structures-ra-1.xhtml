<div>
  <p>Rearrange the following lines of code to define a 
    structure type <code>Date</code> to describe dates such 
    as “July 4” or “December 31”. Not all lines are useful.
  </p>  
  <div class='horstmann_rearrange'>
    <pre>.struct Date
.{
. int day;
- int day = 4;
, string month;
- string month = "July";
.};
-}
</pre>
