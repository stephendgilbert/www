<li title='6d-redirection-mc-2' id='6d-redirection-mc-2'><div class='hc-included'>
<div>
<p>Which line runs the program named <tt>xxd</tt>, adding its output to a file named
    <tt>x.data</tt>?</p>
  <ol class='multiple-choice'>
    <li><tt>./xxd &gt;1 x.data</tt></li>
    <li><tt>./xxd &gt; x.data</tt></li>
    <li><tt>./xxd &lt;&lt; x.data</tt></li>
    <li class='correct'><tt>./xxd &gt;&gt; x.data</tt></li>
    <li><tt>./xxd  &lt; x.data</tt></li>
    <li>None of these</li>
  </ol>
</div>
</div></li>
</ol>
