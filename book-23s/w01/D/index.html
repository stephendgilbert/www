<!DOCTYPE HTML>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Lesson 1C</title>
    <style>
      ul.navlist{
        width:100%;
        list-style-type: none;
        margin: 0;
        margin-left: 3em;
        overflow: hidden;
        padding: 0;
        padding-top: 3px;
        display: inline-block;
        border-top: 1px dotted silver;
      }
      ul.navlist li {
        font-family: serif;
        font-size: 12pt;
        text-decoration: none;
        display: inline;
        /*
        padding-right: .5em;
        padding-left: .5em;
        border-right: 1px solid silver;
        */
        }
      iframe {
        border: none;
      }
      .subtitle {
        font-family: georgia, serif;
        font-style: italic;
        font-size: 10pt;
        padding-right: 2em;
      }
      .link {
          font-weight: bold;
          color: #FFFFFF;
          cursor: pointer;
          padding: 0.2em 0.56em;
          border-radius: 0.56em;
          position: relative;
          font-size: 75%;
          margin-left: 1em;
          margin-right: 1em;
          user-select: none;
          display: inline-block;
          text-decoration: none;
      }
      .active {
        background-color: forestgreen;
        font-weight: bold;
      }
      .inactive {
        background-color: gray;
        fond-weight: normal;
      }

    </style>
</head>
<body>
    <div style="width:850px;">
    <ul class="navlist">
        <li><a class="link" href="A.html" target="iframe_main" onclick='highlight(this)'>A</a></li>
        <li><a class="link" href="B.html" target="iframe_main" onclick='highlight(this)'>B</a></li>
        <li><a class="link" href="C.html" target="iframe_main" onclick='highlight(this)'>C</a></li>
        <li><a class="link" href="D.html" target="iframe_main" onclick='highlight(this)'>D</a></li>
        <li><a class="link" href="E.html" target="iframe_main" onclick='highlight(this)'>E</a></li>
        <li><a class="link" href="F.html" target="iframe_main" onclick='highlight(this)'>F</a></li>
        <li><a class="link" href="G.html" target="iframe_main" onclick='highlight(this)'>G</a></li>
        <li><a class="link" href="H.html" target="iframe_main" onclick='highlight(this)'>H</a></li>
        <li><a class="link" href="I.html" target="iframe_main" onclick='highlight(this)'>I</a></li>
        <li><a class="link" href="J.html" target="iframe_main" onclick='highlight(this)'>J</a></li>
        <li><a class="link" href="K.html" target="iframe_main" onclick='highlight(this)'>K</a></li>
        <li><a class="link" href="L.html" target="iframe_main" onclick='highlight(this)'>L</a></li>
    </ul>
    </div>
    <iframe style="width: 100%; height: 2000px;margin-top:0;" src="https://www.occ-cs.com/book-23s/w01/d/A.html" name="iframe_main"></iframe>
</body>
<script>
  document.links[0].className = 'link active'
  for (var i = 1; i < document.links.length; ++i) {
    document.links[i].className = 'link inactive';
  }
  function highlight(e) {
    //alert(e);
    let current = 0;
    for (var i = 0; i < document.links.length; ++i) {
      if (document.links[i].href === e.href) {
        current = i;
      }
      else {
        document.links[i].className = 'link inactive';
      }
    }
    document.links[current].className = 'link active';
  }
</script>
</html>
